# fly.toml — create app first: fly apps create app-winter-water-3831
# then volume:        fly volumes create data -a app-winter-water-3831 -r iad

app = 'app-winter-water-3831'
primary_region = 'iad'

[build]

[env]
  DATA_DIR = '/app/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'data'
  destination = '/app/data'
