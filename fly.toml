# fly.toml — app-winter-water-3831

app = 'app-winter-water-3831'
primary_region = 'gru'

[build]

[env]
  PORT = '8000'
  ENVIRONMENT = 'production'

[deploy]
  release_command = 'alembic upgrade head'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
