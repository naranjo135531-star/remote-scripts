# fly.toml app configuration file generated for abb on 2026-05-20T21:38:20Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'abb'
primary_region = 'gru'

[build]

[env]
  DATA_DIR = '/app/data'

[[mounts]]
  source = 'data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
