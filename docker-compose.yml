services:
  api:
    build: .
    ports:
      - "8001:8000"
    volumes:
      - ./app:/app/app
    environment:
      PYTHONUNBUFFERED: "1"
      PAYLOAD_HOSTNAME: "localhost:8001"
      ENVIRONMENT: "local"
    command:
      - sh
      - -c
      - alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
